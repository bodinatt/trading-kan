<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#111827"/>
  <!-- Candlestick 1 (green/up) -->
  <line x1="8" y1="6" x2="8" y2="26" stroke="#22c55e" stroke-width="1"/>
  <rect x="6" y="10" width="4" height="10" rx="0.5" fill="#22c55e"/>
  <!-- Candlestick 2 (red/down) -->
  <line x1="16" y1="4" x2="16" y2="24" stroke="#ef4444" stroke-width="1"/>
  <rect x="14" y="8" width="4" height="12" rx="0.5" fill="#ef4444"/>
  <!-- Candlestick 3 (green/up) -->
  <line x1="24" y1="8" x2="24" y2="28" stroke="#22c55e" stroke-width="1"/>
  <rect x="22" y="12" width="4" height="8" rx="0.5" fill="#22c55e"/>
  <!-- TK text -->
  <text x="16" y="31" font-family="Arial,sans-serif" font-size="4" font-weight="bold" fill="#3b82f6" text-anchor="middle">TK</text>
</svg>
